<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C62828" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C62828" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="patty" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#5A3020"/>
      <stop offset="100%" stop-color="#3A1F0C"/>
    </radialGradient>
    <radialGradient id="bun" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#E8A84C"/>
      <stop offset="100%" stop-color="#C88030"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <g transform="translate(300,200)" filter="url(#shadow)">
    <ellipse cx="0" cy="55" rx="120" ry="22" fill="#B8742E"/>
    <ellipse cx="0" cy="35" rx="130" ry="28" fill="url(#patty)"/>
    <ellipse cx="0" cy="18" rx="135" ry="16" fill="#F4B400"/>
    <ellipse cx="0" cy="5" rx="138" ry="14" fill="#4CAF50"/>
    <ellipse cx="0" cy="-10" rx="125" ry="36" fill="url(#bun)"/>
    <ellipse cx="40" cy="-28" rx="6" ry="3" fill="#F5E6C8" transform="rotate(10,40,-28)"/>
    <ellipse cx="-30" cy="-25" rx="6" ry="3" fill="#F5E6C8" transform="rotate(-15,-30,-25)"/>
  </g>
</svg>
